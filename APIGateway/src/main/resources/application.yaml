spring:
  application:
    name: api-gateway

server:
  port: 8080

services:
  auth-url: ${AUTH_URL:http://localhost:8081}
  user-url: ${USER_URL:http://localhost:8082}
  account-url: ${ACCOUNT_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health, info