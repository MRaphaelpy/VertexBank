spring.application.name=vertexbank.authservice
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Docker
spring.docker.compose.enabled=false

#JWT
security.jwt.secret-key=${JWT_SECRET}
# 1h in milliseconds
security.jwt.expiration-time=${JWT_EXPIRATION:3600000}
# 7 days in milliseconds
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION:604800000}
